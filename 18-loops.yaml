- name: install packages
  hosts: frontend
  become: yes
  tasks:
  - name: install packages
    package:
      name: "{{ item.name }}"
      state: "{{ item.state }}"
    loop:
      - { name: "nginx", state: "absent"}
      - { name: "mangodb", state: "present"}
      - { name: "mysql", state: "absent"}